<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Indexer | High-Speed Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .background-glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        .glow-orb {
            position: absolute;
            width: 600px; height: 600px;
            background: var(--primary-glow);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
            animation: drift 20s infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            color: white;
            font-size: 1rem;
            resize: none;
            transition: border-color 0.3s;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .btn-submit:hover {
            transform: translateY(-2px) scale(1.02);
            background: #4f46e5;
            box-shadow: 0 20px 25px -5px var(--primary-glow);
        }

        .btn-submit:active { transform: translateY(0) scale(0.98); }

        .launching {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
            transform: translate3d(0, 0, 0);
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #818cf8;
            margin-bottom: 4px;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        #status-message {
            margin-top: 20px;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .success { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* Tab System */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.5);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
        }

        .tab-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Project Cards */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            position: relative;
        }

        .project-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .project-domain { font-size: 0.8rem; color: #64748b; margin-bottom: 16px; }
        
        .api-key-box {
            background: rgba(15, 23, 42, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #818cf8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .copy-btn:hover { color: #fff; }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 20px;">Rocket Admin</h2>
            <input type="password" id="admin-pass" placeholder="Enter Admin Password">
            <button class="btn-submit" onclick="attemptLogin()">Access Dashboard</button>
        </div>
    </div>

    <div class="background-glow"></div>
    <div class="glow-orb"></div>
    
    <div class="container">
        <header>
            <h1>Rocket Indexer</h1>
            <p class="subtitle">High-Intensity Discovery & Signal Core</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('home')">Home</button>
            <button class="tab-btn" onclick="switchTab('projects')">Projects</button>
        </div>

        <div id="home-tab" class="tab-content active">
            <div class="form-group">
                <label for="urls">Paste URLs (one per line)</label>
                <textarea id="urls" placeholder="https://example.com/page-1&#10;https://example.com/page-2"></textarea>
            </div>

            <button class="btn-submit" id="submit-btn">BLAST SIGNALS</button>

            <div id="status-message"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">Total Links</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-indexed">-</div>
                    <div class="stat-label">Indexed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-pending">-</div>
                    <div class="stat-label">Signal Queue</div>
                </div>
            </div>

            <div class="activity-section">
                <div class="activity-header">
                    <label>Recent Discovery Signals</label>
                    <div class="hub-links">
                        <a href="/sitemap.xml" target="_blank" class="hub-link">📄 Sitemap</a>
                        <a href="/rss.xml" target="_blank" class="hub-link">📡 RSS Feed</a>
                        <a href="/recent" target="_blank" class="hub-link">🧲 Crawl Hub</a>
                    </div>
                </div>
                <table class="activity-table">
                    <tbody id="activity-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="projects-tab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Active Projects</label>
                <button class="btn-submit" style="width: auto; padding: 8px 16px; font-size: 0.8rem;" onclick="openModal()">+ New Project</button>
            </div>
            <div class="project-grid" id="project-list">
                <!-- Projects injected via JS -->
            </div>
        </div>

        <footer>
            Built with Rocket Core Engine &bull; Enterprise Discovery Logic
        </footer>
    </div>

    <!-- Create Project Modal -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Create New Project</h2>
            <label>Project Name</label>
            <input type="text" id="proj-name" placeholder="My Awesome Website">
            <label>Target Domain</label>
            <input type="text" id="proj-domain" placeholder="https://example.com">
            <label>Google Service Account (Optional JSON)</label>
            <textarea id="proj-sa" placeholder="{ ... }" style="height: 100px; margin-bottom: 20px;"></textarea>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-submit" onclick="saveProject()">Create Project</button>
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = localStorage.getItem('rocket_admin_pw') || '';
        const submitBtn = document.getElementById('submit-btn');
        const urlsTextarea = document.getElementById('urls');
        const statusMsg = document.getElementById('status-message');
        const activityBody = document.getElementById('activity-body');
        const projectList = document.getElementById('project-list');

        function attemptLogin() {
            adminPassword = document.getElementById('admin-pass').value;
            localStorage.setItem('rocket_admin_pw', adminPassword);
            checkAuth();
        }

        async function checkAuth() {
            try {
                const res = await fetch('/projects', { headers: { 'x-admin-password': adminPassword } });
                if (res.ok) {
                    document.getElementById('login-screen').style.display = 'none';
                    loadStats();
                    loadProjects();
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }
            } catch (e) {
                document.getElementById('login-screen').style.display = 'flex';
            }
        }

        checkAuth();

        async function apiFetch(url, options = {}) {
            options.headers = { 
                ...options.headers, 
                'x-admin-password': adminPassword 
            };
            return fetch(url, options);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(`${tabId}-tab`).classList.add('active');
            
            if (tabId === 'projects') loadProjects();
        }

        function openModal() { document.getElementById('project-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('project-modal').style.display = 'none'; }

        async function saveProject() {
            const name = document.getElementById('proj-name').value;
            const domain = document.getElementById('proj-domain').value;
            const sa = document.getElementById('proj-sa').value;

            try {
                const res = await apiFetch('/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, domain, googleServiceAccount: sa ? JSON.parse(sa) : null })
                });

                if (res.ok) {
                    closeModal();
                    loadProjects();
                } else {
                    alert('Failed to create project');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function loadProjects() {
            if (!adminPassword) return;
            try {
                const res = await apiFetch('/projects');
                const data = await res.json();
                projectList.innerHTML = data.map(p => `
                    <div class="project-card">
                        <div class="project-name">${p.name}</div>
                        <div class="project-domain">${p.domain || 'No domain set'}</div>
                        <div class="stat-label">API KEY</div>
                        <div class="api-key-box">
                            <span>${p.apiKey}</span>
                            <button class="copy-btn" onclick="copyKey('${p.apiKey}')">Copy</button>
                        </div>
                        <div style="margin-top: 15px; font-size: 0.7rem; color: #475569;">
                            Total Links: ${p._count.urls}
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert('API Key copied to clipboard!');
        }

        submitBtn.addEventListener('click', async () => {
            const urls = urlsTextarea.value.split('\n').filter(u => u.trim() !== '');
            
            if (urls.length === 0) {
                showStatus('Please paste at least one URL', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('launching');
            submitBtn.textContent = 'LAUNCHING SIGNALS...';

            try {
                const response = await apiFetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(`Successfully launched signals for ${urls.length} URLs!`, 'success');
                    urlsTextarea.value = '';
                    setTimeout(loadStats, 1000);
                } else {
                    showStatus(data.error || 'Failed to launch signals', 'error');
                }
            } catch (err) {
                showStatus('Network error occurred', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('launching');
                submitBtn.textContent = 'BLAST SIGNALS';
            }
        });

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = type;
            statusMsg.style.display = 'block';
            setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
        }

        async function loadStats() {
            if (!adminPassword) return;
            try {
                const res = await apiFetch('/recent', { headers: { 'Accept': 'application/json' } });
                const data = await res.json();
                
                document.getElementById('stat-total').textContent = data.length || 0;
                document.getElementById('stat-pending').textContent = data.filter(u => u.status === 'pending' || u.status === 'processing').length;
                document.getElementById('stat-indexed').textContent = data.filter(u => u.indexingStatus === 'indexed').length;

                // Update activity table
                activityBody.innerHTML = data.slice(0, 10).map(u => `
                    <tr class="activity-row">
                        <td class="activity-cell">
                            <a href="${u.url}" target="_blank" class="url-link">${u.url}</a>
                            <div style="font-size: 0.65rem; color: #475569;">${u.indexingStatus === 'indexed' ? '✅ Indexed' : '⏳ Checking...'}</div>
                        </td>
                        <td class="activity-cell"><span class="badge badge-${u.status}">${u.status}</span></td>
                        <td class="activity-cell" style="text-align: right;">
                            <button class="copy-btn" style="color: #818cf8; font-weight: 600;" onclick="verifyUrl('${u.id}')">Verify</button>
                            <div style="color: #475569; font-size: 0.6rem; margin-top: 4px;">
                                ${new Date(u.updatedAt).toLocaleTimeString()}
                            </div>
                        </td>
                    </tr>
                `).join('');

            } catch (e) {
                console.warn('Failed to load stats:', e);
            }
        }

        async function verifyUrl(id) {
            try {
                const res = await apiFetch(`/urls/${id}/verify`, { method: 'POST' });
                const data = await res.json();
                if (data.isIndexed) {
                    alert('🚀 URL is INDEXED!');
                } else {
                    alert('⏳ Not yet indexed. Signals are still blasting!');
                }
                loadStats();
            } catch (e) { alert('Verification failed'); }
        }

        loadStats();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
