services:
  - type: web
    name: rocket-indexer-api
    env: node
    plan: free

    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: indexer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: indexer-redis
          property: connectionString
      - key: DOMAIN
        sync: false # Set this to your Render URL after the first deploy
      - key: PORT
        value: 10000

  - type: redis
    name: indexer-redis
    plan: free
    ipAllowList: [] # Allow all internal traffic

databases:
  - name: indexer-db
    plan: free
