services:
  - type: web
    name: rocket-indexer-api
    env: node
    plan: starter
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: indexer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: indexer-redis
          property: connectionString
      - key: DOMAIN
        sync: false # Set this to your Render URL after the first deploy
      - key: PORT
        value: 10000

databases:
  - name: indexer-db
    plan: free

keyvalues:
  - name: indexer-redis
    plan: free
